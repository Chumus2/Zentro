{% extends 'Base/Base.html' %}
{% load static %}

{% block title %}
    {{ user.name }}'s Profile - Zentro
{% endblock %}

{% block styles %}
    <link rel="stylesheet" href="stylesheets/Profiles/Profiles.css">
{% endblock %}

{% block content %}

    <div>

        <div>

            <a href="{% url 'Main' %}" target="_self">Back</a>

            {% if user.profile.icon %}
                <img src="{{ user.profile.icon.url }}" loading="lazy">
            {% else %}
                <img src="{% static 'images/DefaultProfileIcon.png' %}" loading="lazy">
            {% endif %} 

        </div>

    </div>

{% endblock %}
